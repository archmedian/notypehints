name: Fuzzy Testing with Atheris

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

jobs:
  fuzzy-test:
    name: Run Atheris fuzzy testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48
        with:
          python-version: "3.11.15"

      - name: Set up Clang
        uses: egor-tensin/setup-clang@763f0ed522044adec12eaa1a768edfb1a98a635a #v2
        with:
          platform: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync

      - name: Run fuzzy testing (short run for CI)
        run: |
          echo "Running Atheris fuzzy testing for 30 seconds per target..."
          timeout 2s uv run python -m tests.fuzz.fuzz_test || true 
        continue-on-error: true

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: fuzz-artifacts
          path: |
            fuzz_*
            **/fuzz_*
          if-no-files-found: ignore

  fuzzy-test-extended:
    name: Extended fuzzy testing
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48
        with:
          python-version: "3.11.15"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync

      - name: Run extended fuzzy testing (5 seconds per target)
        run: |
          echo "Running extended Atheris fuzzy testing for 5 minutes per target..."
          timeout 5s uv run python -m tests.fuzz.fuzz_test || true 
        continue-on-error: true

      - name: Upload extended fuzz artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: fuzz-artifacts-extended
          path: |
            fuzz_*
            **/fuzz_*
          if-no-files-found: ignore
