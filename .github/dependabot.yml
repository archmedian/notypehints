version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    ignore:
      - dependency-name: "atheris"
        update-types: ["version-update:semver-major"]
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
